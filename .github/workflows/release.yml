name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'packages/ui/package.json'

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm run build --filter=@tableslayer/ui

      - name: Check if version changed
        id: version_check
        run: |
          # Get the current version from package.json
          CURRENT_VERSION=$(node -p "require('./packages/ui/package.json').version")

          # Check if this version is already published
          if npm view "@tableslayer/ui@$CURRENT_VERSION" version 2>/dev/null; then
            echo "Version $CURRENT_VERSION already published"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "Version $CURRENT_VERSION not yet published"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.should_publish == 'true'
        working-directory: packages/ui
        env:
          NPM_CONFIG_PROVENANCE: true
        run: |
          echo "Node version: $(node -v)"
          echo "npm version: $(npm -v)"
          npm publish --access public
