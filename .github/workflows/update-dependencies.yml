name: Update dependencies

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # once every monday

jobs:
  update-deps:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v3
      - name: Read .nvmrc
        run: echo "NVMRC=$(cat .nvmrc)" >> $GITHUB_OUTPUT
        id: nvm

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ steps.nvm.outputs.NVMRC }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ steps.nvm.outputs.NVMRC }}
          cache: 'pnpm'

      - name: Check for updates
        id: ncu
        run: |
          OUTPUT=$(npx -y npm-check-updates -u -t latest --deep --filterVersion "/^[^=]/" --dep prod,dev,optional)
          echo "stdout<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Parse version changes
        id: parse
        run: |
          # Parse ncu output to separate major vs other updates
          # ncu format: "package-name  ^1.2.3  →  ^2.0.0"

          MAJOR_UPDATES=""
          OTHER_UPDATES=""

          while IFS= read -r line; do
            # Skip empty lines, headers, and path lines
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^[[:space:]]*$ ]] && continue
            [[ "$line" =~ "Checking" ]] && continue
            [[ "$line" =~ "Run" ]] && continue
            [[ "$line" =~ "Upgrading" ]] && continue
            [[ "$line" =~ "Using" ]] && continue

            # Match: package-name    ^1.2.3  →  ^2.0.0
            # Require whitespace boundaries to avoid greedy matching
            if [[ "$line" =~ [[:space:]][\^~]?([0-9]+)\.[0-9]+\.[0-9]+[[:space:]]+→[[:space:]]+[\^~]?([0-9]+)\.[0-9]+\.[0-9]+ ]]; then
              OLD_MAJOR="${BASH_REMATCH[1]}"
              NEW_MAJOR="${BASH_REMATCH[2]}"

              if [[ "$OLD_MAJOR" != "$NEW_MAJOR" ]]; then
                MAJOR_UPDATES="${MAJOR_UPDATES}${line}"$'\n'
              else
                OTHER_UPDATES="${OTHER_UPDATES}${line}"$'\n'
              fi
            else
              OTHER_UPDATES="${OTHER_UPDATES}${line}"$'\n'
            fi
          done <<< "${{ steps.ncu.outputs.stdout }}"

          # Output results using heredoc for multiline
          echo "major<<EOF" >> $GITHUB_OUTPUT
          echo "$MAJOR_UPDATES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "other<<EOF" >> $GITHUB_OUTPUT
          echo "$OTHER_UPDATES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Set flag if major updates exist
          if [[ -n "$MAJOR_UPDATES" ]]; then
            echo "has_major=true" >> $GITHUB_OUTPUT
          else
            echo "has_major=false" >> $GITHUB_OUTPUT
          fi

      - name: Install new versions
        run: |
          pnpm install --no-frozen-lockfile
          git add .

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'Update dependencies'
          committer: 'Dave <dave.snider@gmail.com>'
          title: 'Update dependencies'
          body: |
            Autogenerated PR to update dependencies.

            > **Note:** To run CI checks, go to Actions → PR → Run workflow and select this branch.

            ${{ steps.parse.outputs.has_major == 'true' && '## ⚠️ Major version changes' || '' }}
            ${{ steps.parse.outputs.has_major == 'true' && '```' || '' }}
            ${{ steps.parse.outputs.major }}${{ steps.parse.outputs.has_major == 'true' && '```' || '' }}

            ## All updates
            ```
            ${{ steps.ncu.outputs.stdout }}
            ```
          branch: update-dependencies-${{ github.run_id }}
