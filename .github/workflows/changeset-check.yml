name: Changeset Check

on:
  pull_request:
    branches:
      - main

jobs:
  check-changeset:
    name: Check for changeset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if UI files changed
        id: ui-changes
        run: |
          # Get list of changed files in this PR
          CHANGED=$(git diff --name-only origin/main...HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          # Check if any files in packages/ui/ changed
          if echo "$CHANGED" | grep -q "^packages/ui/"; then
            echo "ui_changed=true" >> $GITHUB_OUTPUT
          else
            echo "ui_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup pnpm
        if: steps.ui-changes.outputs.ui_changed == 'true'
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        if: steps.ui-changes.outputs.ui_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.ui-changes.outputs.ui_changed == 'true'
        run: pnpm install

      - name: Check for changeset
        if: steps.ui-changes.outputs.ui_changed == 'true'
        run: |
          # Check if there are any new changeset files in this PR
          CHANGESETS=$(git diff --name-only origin/main...HEAD | grep "^\.changeset/.*\.md$" | grep -v "README.md" || true)

          if [ -z "$CHANGESETS" ]; then
            echo "Error: UI files changed but no changeset found!"
            echo ""
            echo "Please run 'pnpm changeset' to create a changeset describing your changes."
            echo "Then commit the generated .changeset/*.md file with your PR."
            exit 1
          else
            echo "Changeset found: $CHANGESETS"
          fi
